<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AegisFlow</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- ===================================================== -->
    <!-- Header -->
    <!-- ===================================================== -->

    <header>

        <div class="header-left">

            <h1>AegisFlow</h1>

            <p class="subtitle">
                Developer Workspace
            </p>

        </div>

        <div class="header-right">

            <span id="status">

                🟢 Workspace Ready

            </span>

            <span class="version">

                v0.0.5

            </span>

        </div>

    </header>


    <!-- ===================================================== -->
    <!-- Main Workspace -->
    <!-- ===================================================== -->

    <main class="workspace-layout">


        <!-- ============================================== -->
        <!-- Current Workspace -->
        <!-- ============================================== -->

        <section
            class="panel"
            id="workspace-panel">

            <h2>

                Current Workspace

            </h2>

            <div class="field">

                <label>

                    Project

                </label>

                <input
                    id="project"
                    type="text"
                    placeholder="AegisFlow">

            </div>

            <div class="field">

                <label>

                    Current Task

                </label>

                <input
                    id="task"
                    type="text"
                    placeholder="What are you working on?">

            </div>

            <div class="field">

                <label>

                    Session Notes

                </label>

                <textarea
                    id="note"
                    placeholder="Today's progress...">
                </textarea>

            </div>

            <div class="buttons">

                <button id="start-session">

                    Start

                </button>

                <button id="end-session" style="display:none;">

                    End

                </button>

            </div>

        </section>

        <!-- ============================================== -->
        <!-- Session Wrap-up -->
        <!-- ============================================== -->


        <section
            class="panel"
            id="session-wrapup"
            style="display: none;">

            <h2>Session Wrap-up</h2>

            <div class="field-group">
                <label for="summary-input">Summary</label>

                <textarea
                    id="summary-input"
                    rows="4"
                    placeholder="What did you accomplish in this session?">
                </textarea>
            </div>

            <div class="field-group">
                <label for="next-step-input">Next Step</label>

                <input
                    id="next-step-input"
                    type="text"
                    placeholder="What should you work on next?">
            </div>

            <button id="save-session-btn">
                Save Session
            </button>

        </section>


        <!-- ============================================== -->
        <!-- Previous Session -->
        <!-- Hidden when there is no history -->
        <!-- ============================================== -->

        <section
            class="panel"
            id="previous-session"
            style="display:none;">
            

            <h2>

                Previous Session

            </h2>

            <div class="summary-item">

                <span>

                    Last Project

                </span>

                <strong id="previous-project">

                    AegisFlow

                </strong>

            </div>

            <div class="summary-item">

                <span>

                    Last Task

                </span>

                <strong id="previous-task">

                    Event Persistence

                </strong>

            </div>

            <div class="summary-item">

                <span>

                    Summary

                </span>

                <p id="summary">

                    ✔ Event Persistence completed successfully.

                </p>

            </div>

            <div class="summary-item">

                <span>

                    Next Step

                </span>

                <strong id="next-step">

                    Workspace State

                </strong>

            </div>

        </section>


        <!-- ============================================== -->
        <!-- Live Events -->
        <!-- ============================================== -->

        <section
            class="panel"
            id="live-events">

            <h2>

                Live Events

            </h2>

            <ul id="events">

                <li>

                    Workspace ready.
                    Waiting for events...

                </li>

            </ul>

        </section>


    </main>

    <script type="module" src="./js/app.js"></script>

</body>

</html>
